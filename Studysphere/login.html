<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Sphere | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg">

    <div class="signup-container">

        <!-- LEFT SIDE TEXT -->
        <div class="left-text">
            <h1>Study Sphere</h1>
            <b><p>Your Smart Study Companion</p></b>
        </div>

        <!-- LOGIN FORM -->
        <div class="form-card">
            <h2>Login</h2>

            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>

            <button type="button" id="loginBtn" class="primary-btn" onclick="login()">Sign In</button>

            <a href="signup.html" class="login-btn">Don't have an account? Sign Up</a>

            <div id="loginMessage" style="color:#c00;margin-top:10px"></div>
        </div>

    </div>

</div>

<script src="javascript/login.js"></script>

</body>
</html>
